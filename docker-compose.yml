version: '3'
services:
 db:
   image: postgres:10.7
   ports:
     - "5432:5432"
   volumes:
     - ./setup/init.sql:/docker-entrypoint-initdb.d/init.sql
 wagtail:
   build:
      context: .
   env_file: .env
   command: python manage.py runserver 0.0.0.0:8000
   volumes:
     - ./:/app/
   ports:
     - "0.0.0.0:8000:8000"
   depends_on:
     - db
   environment:
     - DJANGO_SETTINGS_MODULE=config.settings.local
